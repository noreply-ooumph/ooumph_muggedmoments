name: Auto Poster Bot

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install groq python-dotenv requests Pillow --quiet
      - name: Write credentials
        run: |
          printf 'GROQ_API_KEY=%s\nGRAPH_PAGE_TOKEN=%s\nGRAPH_IG_USER_ID=%s\n' \
            '${{ secrets.GROQ_API_KEY }}' '${{ secrets.GRAPH_PAGE_TOKEN }}' '${{ secrets.GRAPH_IG_USER_ID }}' > .env
      - name: Generate content and image
        run: python graph_poster.py --step generate
      - name: Commit image to repo
        run: |
          git config user.name "muggedmoments-bot"
          git config user.email "bot@ooumph.com"
          git add -f generated_images/pending_post.jpg pending_post.json
          git diff --cached --quiet || git commit -m "bot: pending post image [skip ci]"
          git pull --rebase origin main || true
          git push || true
      - name: Wait for GitHub CDN
        run: sleep 20
      - name: Publish to Instagram via Graph API
        run: python graph_poster.py --step publish
      - name: Save state
        run: |
          git config user.name "muggedmoments-bot"
          git config user.email "bot@ooumph.com"
          git add -f posted_content.json brain_memory.json content_plan.json posts_list.json
          git diff --cached --quiet || git commit -m "bot: post published [skip ci]"
          git pull --rebase origin main || true
          git push || true
