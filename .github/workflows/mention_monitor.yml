name: Mention Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor-mentions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install groq python-dotenv requests --quiet

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GRAPH_PAGE_TOKEN=${{ secrets.GRAPH_PAGE_TOKEN }}
          GRAPH_IG_USER_ID=${{ secrets.GRAPH_IG_USER_ID }}
          GH_PAT=${{ secrets.GH_PAT }}
          ACCOUNT_NAME=${{ vars.ACCOUNT_NAME }}
ENVEOF

      - name: Run Mention Monitor
        run: python mention_monitor.py

      - name: Commit state
        run: |
          git config user.name "ooumph-bot"
          git config user.email "bot@ooumph.com"
          git add -f processed_mentions.json
          git diff --cached --quiet || git commit -m "bot: update processed_mentions state [skip ci]"
          git stash 2>/dev/null || true
          git pull --rebase origin main || true
          git stash pop 2>/dev/null || true
          git push || true
