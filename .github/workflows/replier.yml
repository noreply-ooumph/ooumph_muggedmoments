name: Auto Reply Bot
# muggedmoments

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install groq python-dotenv requests --quiet
      - name: Write credentials
        run: |
          printf "GROQ_API_KEY=%s
GRAPH_PAGE_TOKEN=%s
GRAPH_IG_USER_ID=%s
"             "${{ secrets.GROQ_API_KEY }}" "${{ secrets.GRAPH_PAGE_TOKEN }}" "${{ secrets.GRAPH_IG_USER_ID }}" > .env
      - name: Run Graph API replier
        run: python -u graph_replier.py
      - name: Save replied state
        run: |
          git config user.name "muggedmoments-bot"
          git config user.email "bot@ooumph.com"
          git add -f replied_comments.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: update reply state [skip ci]"
          git pull --rebase origin main || true
          git push || true
