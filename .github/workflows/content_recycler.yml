name: Content Recycler

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  recycle-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install groq python-dotenv requests --quiet

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GRAPH_PAGE_TOKEN=${{ secrets.GRAPH_PAGE_TOKEN }}
          GRAPH_IG_USER_ID=${{ secrets.GRAPH_IG_USER_ID }}
          GH_PAT=${{ secrets.GH_PAT }}
          ACCOUNT_NAME=${{ vars.ACCOUNT_NAME }}
          IG_USERNAME=${{ vars.IG_USERNAME }}
ENVEOF

      - name: Run Content Recycler
        run: python content_recycler.py

      - name: Commit state
        run: |
          git config user.name "ooumph-bot"
          git config user.email "bot@ooumph.com"
          git add -f recycled_posts.json
          git diff --cached --quiet || git commit -m "bot: update recycled_posts state [skip ci]"
          git stash 2>/dev/null || true
          git pull --rebase origin main || true
          git stash pop 2>/dev/null || true
          git push || true
